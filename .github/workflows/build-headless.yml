name: Build Windows app

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install frontend dependencies
        run: npm install --legacy-peer-deps

      - name: Install NASM (for BoringSSL)
        run: choco install nasm -y

      - name: Add NASM to PATH
        shell: pwsh
        run: echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Build Antigravity Tools
        run: npm run tauri build -- --ci --no-sign --config src-tauri/tauri.artifact.conf.json

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: antigravity-tools-windows-x64
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
